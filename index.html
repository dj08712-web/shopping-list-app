<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }
    .app {
      background: #fff;
      width: 100%;
      max-width: 440px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }
    header {
      padding: 24px;
      background: #5b4bc4;
      color: #fff;
    }
    header h1 { font-size: 22px; }
    header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
    .input-row {
      display: flex;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid #eee;
    }
    .input-row input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }
    .input-row input:focus { border-color: #5b4bc4; }
    .input-row button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #5b4bc4;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .input-row button:hover { background: #4a3ba8; }
    ul { list-style: none; }
    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #f2f2f2;
    }
    li .check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #c4c4c4;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    li.done .check {
      background: #5b4bc4;
      border-color: #5b4bc4;
    }
    li .check::after {
      content: "";
      width: 6px;
      height: 11px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0;
    }
    li.done .check::after { opacity: 1; }
    li .name {
      flex: 1;
      font-size: 16px;
      color: #333;
      word-break: break-all;
    }
    li.done .name {
      text-decoration: line-through;
      color: #aaa;
    }
    li .delete {
      background: none;
      border: none;
      color: #d05050;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    li .delete:hover { background: #fbeaea; }
    .empty {
      padding: 40px 16px;
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }
    footer {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #888;
      background: #fafafa;
    }
    footer button {
      background: none;
      border: none;
      color: #d05050;
      font-size: 13px;
      cursor: pointer;
    }
    footer button:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <p>장 볼 항목을 추가하고 체크하세요</p>
    </header>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="예: 우유, 계란, 빵..." maxlength="50" />
      <button id="addBtn">추가</button>
    </div>

    <ul id="list"></ul>

    <footer>
      <span id="status">0개 항목</span>
      <button id="clearDone">완료 항목 비우기</button>
    </footer>
  </div>

  <script>
    const STORAGE_KEY = "shopping-list-items";
    const input = document.getElementById("itemInput");
    const addBtn = document.getElementById("addBtn");
    const list = document.getElementById("list");
    const status = document.getElementById("status");
    const clearDoneBtn = document.getElementById("clearDone");

    let items = load();

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function addItem() {
      const name = input.value.trim();
      if (!name) return;
      items.push({ id: Date.now() + Math.random(), name, done: false });
      input.value = "";
      input.focus();
      save();
      render();
    }

    function toggleItem(id) {
      const item = items.find((i) => i.id === id);
      if (item) item.done = !item.done;
      save();
      render();
    }

    function deleteItem(id) {
      items = items.filter((i) => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      items = items.filter((i) => !i.done);
      save();
      render();
    }

    function render() {
      list.innerHTML = "";

      if (items.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "아직 항목이 없습니다. 위에서 추가해 보세요!";
        list.appendChild(empty);
      } else {
        items.forEach((item) => {
          const li = document.createElement("li");
          if (item.done) li.classList.add("done");

          const check = document.createElement("span");
          check.className = "check";
          check.title = "완료 토글";
          check.addEventListener("click", () => toggleItem(item.id));

          const name = document.createElement("span");
          name.className = "name";
          name.textContent = item.name;
          name.addEventListener("click", () => toggleItem(item.id));

          const del = document.createElement("button");
          del.className = "delete";
          del.textContent = "✕";
          del.title = "삭제";
          del.addEventListener("click", () => deleteItem(item.id));

          li.append(check, name, del);
          list.appendChild(li);
        });
      }

      const remaining = items.filter((i) => !i.done).length;
      status.textContent = `${items.length}개 항목 · ${remaining}개 남음`;
    }

    addBtn.addEventListener("click", addItem);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addItem();
    });
    clearDoneBtn.addEventListener("click", clearDone);

    render();
  </script>
</body>
</html>
